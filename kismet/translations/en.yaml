configuration:
  wifi_interfaces:
    name: Wi-Fi interfaces
    description: Comma-separated Linux interface names from the host. Run ip link on HA (SSH) — often not wlan0 (wlp…, wlan1).
  enable_ble_capture:
    name: Enable BLE
    description: Add Linux Bluetooth HCI capture (requires compatible adapter).
  ble_interface:
    name: BLE HCI device
    description: HCI device name when BLE capture is enabled (e.g. hci0).
  kismet_additional_args:
    name: Extra Kismet arguments
    description: Optional arguments appended to the Kismet command line.
  http_username:
    name: Web UI username
    description: Default admin — written to kismet_site.conf so the first-run login wizard is skipped. Change for security on untrusted networks. Stored under persistent add-on data.
  http_password:
    name: Web UI password
    description: Default admin — use with username; empty fields in options fall back to admin / admin.
