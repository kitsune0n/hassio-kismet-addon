configuration:
  wifi_interfaces:
    name: Wi-Fi interfaces
    description: Comma-separated Linux interface names from the host. Run ip link on HA (SSH) — often not wlan0 (wlp…, wlan1).
  enable_ble_capture:
    name: Enable BLE
    description: Add Linux Bluetooth HCI capture (requires compatible adapter).
  ble_interface:
    name: BLE HCI device
    description: HCI device name when BLE capture is enabled (e.g. hci0).
  kismet_additional_args:
    name: Extra Kismet arguments
    description: Optional arguments appended to the Kismet command line.
  http_username:
    name: Web UI username (optional)
    description: If set together with password, writes kismet_site.conf so you skip first-run browser setup. Stored under persistent add-on data.
  http_password:
    name: Web UI password (optional)
    description: Must be set with http_username if you use fixed credentials.
